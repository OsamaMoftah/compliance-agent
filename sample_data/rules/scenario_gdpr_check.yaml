fabric:
  version: "0.1.0"

scenario:
  id: "privacy-policy-check-001"
  description: "GDPR and AI Act compliance check for company privacy policy"
  jurisdiction: "EU"

  facts:
    - predicate: "collects_personal_data"
      value: 1.0
      evidence: "Policy states collection of name, email, and job title"

    - predicate: "has_consent_mechanism"
      value: 1.0
      evidence: "Explicit user consent mentioned in Data Collection section"

    - predicate: "transfers_data_outside_eu"
      value: 0.8
      evidence: "Mentions transfer to United States under SCCs"

    - predicate: "uses_automated_processing"
      value: 0.7
      evidence: "Automated profiling for content recommendations"

    - predicate: "has_encryption"
      value: 1.0
      evidence: "Encryption at rest and in transit"

    - predicate: "has_retention_policy"
      value: 1.0
      evidence: "Retention period specified as account duration plus 24 months"

    - predicate: "shares_with_third_parties"
      value: 0.9
      evidence: "Data shared for service delivery, analytics, and marketing"

    - predicate: "uses_ai_systems"
      value: 0.8
      evidence: "AI systems for profiling, bias audits mentioned"

    - predicate: "has_human_oversight"
      value: 0.9
      evidence: "Human oversight review for AI systems"
